services:

    watchtower:
        restart: always
        hostname: watchtower
        container_name: watchtower
        image: nickfedor/watchtower:latest      
        environment:
            TZ: "Asia/Jerusalem"
            WATCHTOWER_CLEANUP: "true"
            WATCHTOWER_SCHEDULE: "0 20 3 * * *"
            WATCHTOWER_NOTIFICATIONS: "shoutrrr"
            WATCHTOWER_NOTIFICATION_REPORT: "true"
            WATCHTOWER_NOTIFICATION_URL: >
                telegram://${MY_DOCKER_BOT_TOKEN}@telegram?channels=${TELEGRAM_CHAT_ID}
            WATCHTOWER_NOTIFICATION_TEMPLATE: |
                {{- if .Report -}}
                  {{- with .Report -}}
                    {{- if ( or .Updated .Failed .Skipped ) -}}
                {{len .Scanned}} Scanned
                      {{- if .Updated -}}
                , {{len .Updated}} Updated
                      {{- end -}}
                      {{- if ( .Failed ) -}}
                , {{len .Failed}} Failed
                      {{- end -}}
                      {{- if ( or .Skipped ) -}}
                , {{len .Skipped}} Skipped
                      {{- end -}}					  
                      {{- range .Updated}}
                - {{.Name}} updated
                      {{- end -}}
                      {{- range .Skipped}}
                - {{.Name}}: {{.State}}: {{.Error}}
                      {{- end -}}
                      {{- range .Failed}}
                - {{.Name}}: {{.State}}: {{.Error}}
                      {{- end -}}
                    {{- end -}}
                  {{- end -}}
                {{- else -}}
                  {{range .Entries -}}{{.Message}}{{"\n"}}{{- end -}}
                {{- end -}}
            WATCHTOWER_WARN_ON_HEAD_FAILURE: "never"
            WATCHTOWER_NOTIFICATION_TITLE_TAG: "RPi Floor 2"          
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock