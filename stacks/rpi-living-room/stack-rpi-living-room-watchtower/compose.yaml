services:

    watchtower:
        restart: always
        hostname: watchtower
        container_name: watchtower
        image: nickfedor/watchtower:latest
        network_mode: "bridge"
        ports:
            - "8585:8080"         
        environment:
            TZ: "Asia/Jerusalem"
            WATCHTOWER_CLEANUP: "true"
            WATCHTOWER_SCHEDULE: "0 0 3 * * *"
            WATCHTOWER_NOTIFICATIONS: "shoutrrr"
            WATCHTOWER_NOTIFICATION_REPORT: "true"
            WATCHTOWER_NOTIFICATION_URL: >
                telegram://${MY_DOCKER_BOT_TOKEN}@telegram?channels=${TELEGRAM_CHAT_ID}
            WATCHTOWER_NOTIFICATION_TEMPLATE: |
                {{- if .Report -}}
                  {{- with .Report -}}
                    {{- if ( or .Updated .Failed .Skipped ) -}}
                      {{- if .Updated -}}
                {{len .Scanned}} Scanned, {{len .Updated}} Updated
                      {{- end -}}
                      {{- if ( or .Failed .Skipped ) -}}
                {{len .Skipped}} Skipped, {{len .Failed}} Failed
                      {{- end -}}
                      {{- range .Skipped}}
                - {{.Name}}: {{.State}}: {{.Error}}
                      {{- end -}}
                      {{- range .Failed}}
                - {{.Name}}: {{.State}}: {{.Error}}
                      {{- end -}}
                    {{- end -}}
                  {{- end -}}
                {{- else -}}
                  {{range .Entries -}}{{.Message}}{{"\n"}}{{- end -}}
                {{- end -}} 
            WATCHTOWER_WARN_ON_HEAD_FAILURE: "never"
            WATCHTOWER_NOTIFICATION_TITLE_TAG: "RPi Living Room"         
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
